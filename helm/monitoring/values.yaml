# ==============================================================================
# Monitoring Umbrella Chart Default Values Configuration
# ==============================================================================

# Default configurations for the Prometheus Stack
kube-prometheus-stack:
  enabled: true

  prometheus:
    service:
      type: NodePort
      nodePort: 30090
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

      # Additional scrape configurations for service discovery in EKS
      additionalScrapeConfigs:
        - job_name: "easyshop"
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: easyshop-frontend|frontend|easyshop
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              action: keep
              regex: "3000|8080|80"
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod

        - job_name: "mongodb"
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: .*mongodb.*
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              action: keep
              regex: "9216"
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod

        - job_name: "nginx-ingress"
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels:
                [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              action: keep
              regex: ingress-nginx
            - source_labels: [__meta_kubernetes_pod_container_port_name]
              action: keep
              regex: metrics
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: pod

  # Grafana deployment and persistent storage parameters
  grafana:
    enabled: true
    service:
      type: NodePort
      nodePort: 30030
    adminPassword: admin # Change in production override files!
    persistence:
      enabled: true
      size: 10Gi
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValues: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
        searchNamespace: ALL

  # Alertmanager default setup (overridden by static configuration in Kubernetes folder)
  alertmanager:
    enabled: true
    alertmanagerSpec:
      configSecret: alertmanager-config-secret
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["alertname", "cluster", "service"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
      receivers:
        - name: "null"

# Default configurations for Loki (grafana-community/loki)
loki:
  enabled: true
  deploymentMode: Monolithic
  gateway:
    enabled: false
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    ring:
      kvstore:
        store: inmemory
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: s3
      s3:
        endpoint: null
        region: us-east-1
        secretAccessKey: null
        accessKeyId: null
        s3ForcePathStyle: true
      bucketNames:
        chunks: easyshop-logs-bucket
        ruler: easyshop-logs-bucket
        admin: easyshop-logs-bucket
  singleBinary:
    persistence:
      enabled: false

# Default configurations for Promtail (grafana/promtail)
promtail:
  enabled: true
  config:
    clients:
      - url: http://easyshop-monitoring-loki:3100/loki/api/v1/push
