# Dev overrides for nha-monitoring (VMware / Local)
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 7d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            resources:
              requests:
                storage: 10Gi

  grafana:
    persistence:
      enabled: true
      storageClassName: local-path
      size: 5Gi

loki-stack:
  loki:
    persistence:
      enabled: true
      storageClassName: local-path
      size: 10Gi
    config:
      schema_config:
        configs:
          - from: "2024-04-01"
            store: boltdb-shipper
            object_store: filesystem
            schema: v11
            index:
              prefix: loki_index_
              period: 24h
      storage_config:
        boltdb_shipper:
          active_index_directory: /data/loki/boltdb-shipper-active
          cache_location: /data/loki/boltdb-shipper-cache
          cache_ttl: 24h
          shared_store: filesystem
        filesystem:
          directory: /data/loki/chunks
