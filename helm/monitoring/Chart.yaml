apiVersion: v2
name: easyshop-monitoring
description: Umbrella Helm chart for Prometheus, Grafana, and Loki stack for EasyShop
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: kube-prometheus-stack
    version: "62.7.0"
    repository: "https://prometheus-community.github.io/helm-charts"
  - name: loki
    version: "18.0.0"
    repository: "https://grafana-community.github.io/helm-charts"
  - name: promtail
    version: "6.17.1"
    repository: "https://grafana.github.io/helm-charts"
